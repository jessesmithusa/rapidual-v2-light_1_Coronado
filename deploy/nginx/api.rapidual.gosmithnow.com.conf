# api.rapidual.gosmithnow.com — Rapidual partner API (no upstream yet: JSON 503).
# Isolated vhost; certbot --nginx adds the 443 block. Never proxy to dead ports.
server {
    server_name api.rapidual.gosmithnow.com;

    client_max_body_size 256k;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

    location / {
        limit_except GET POST { deny all; }
        proxy_pass http://127.0.0.1:9410;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rapidual.gosmithnow.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rapidual.gosmithnow.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = api.rapidual.gosmithnow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name api.rapidual.gosmithnow.com;
    return 404; # managed by Certbot


}