# rapidual.gosmithnow.com — Rapidual v2 server (no upstream yet: explicit 503).
# Isolated vhost; certbot --nginx adds the 443 block. Never proxy to dead ports.
server {
    server_name rapidual.gosmithnow.com;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

    error_page 503 /503.html;
    location = /503.html { root /var/www/gosmithnow-status; internal; }
    location / { return 503; }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rapidual.gosmithnow.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rapidual.gosmithnow.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = rapidual.gosmithnow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name rapidual.gosmithnow.com;
    return 404; # managed by Certbot


}