# coronadolaundry.gosmithnow.com — FRONTEND NOT BUILT (deliberately deferred).
# Serves an explicit 503 readiness page until the web UI exists.
server {
    server_name coronadolaundry.gosmithnow.com;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

    error_page 503 /503-frontend.html;
    location = /503-frontend.html { root /var/www/gosmithnow-status; internal; }
    location / { return 503; }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rapidual.gosmithnow.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rapidual.gosmithnow.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = coronadolaundry.gosmithnow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name coronadolaundry.gosmithnow.com;
    return 404; # managed by Certbot


}