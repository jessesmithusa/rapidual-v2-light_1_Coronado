name: CI

on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Typecheck packages
        run: pnpm --filter "./packages/*" typecheck
      - name: Unit tests (Vitest)
        run: pnpm test
      - name: App smoke tests (Jest)
        run: pnpm --filter @rapidual/consumer test -- --ci
